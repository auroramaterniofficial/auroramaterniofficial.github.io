<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foto Set | Aurora Materni</title>
    
    <link rel="canonical" href="https://auroramaterniofficial.github.io/foto-set.html" />
    <meta name="robots" content="index, follow">
    
    <link href="https://fonts.googleapis.com/css2?family=Italianno&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; background-color: #1a1a1a; color: #f4f1ea; font-family: 'Montserrat', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* Tasti Home Identici */
        .nav-container { padding: 50px 0; text-align: center; }

        .btn-home { 
            display: inline-block; 
            font-size: 0.75rem; 
            letter-spacing: 2px; 
            text-decoration: none; 
            color: #d4af37; 
            border: 1px solid #d4af37; 
            padding: 12px 25px; 
            text-transform: uppercase; 
            transition: all 0.3s ease; 
            background: transparent;
        }
        
        .btn-home:hover { 
            background-color: #d4af37; 
            color: #1a1a1a; 
            transform: translateY(-3px); 
        }
        
        /* Titolo: font Vivaldi */
        .title-section {
            text-align: center;
            margin: 0px 0 50px 0;
        }

        h1 { 
            /* Priorità al Vivaldi, seguito da Apple Chancery e Italianno */
            font-family: 'Vivaldi', 'Vivaldi Italic', 'Apple Chancery', 'Italianno', cursive; 
            font-size: 5.5rem; 
            color: #d4af37; 
            margin: 0; 
            font-weight: 400; 
            letter-spacing: 2px;
            text-transform: lowercase;
            line-height: 1.1;
        }

        /* Griglia Galleria */
        .gallery-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 90%; max-width: 1100px; padding-bottom: 80px; }
        .gallery-item { position: relative; overflow: hidden; border: 1px solid #333; aspect-ratio: 2/3; background-color: #000; cursor: pointer; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%); transition: 0.6s ease; display: block; }
        .gallery-item:hover img { filter: grayscale(0%); transform: scale(1.03); }

        /* Lightbox */
        #lightbox { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.98); justify-content: center; align-items: center; flex-direction: column; }
        #lightbox img { max-width: 90%; max-height: 80%; border: 1px solid #d4af37; display: none; }
        .close-lightbox { position: absolute; top: 20px; right: 30px; color: #d4af37; font-size: 50px; cursor: pointer; }
        #lightbox-caption { margin-top: 25px; color: #d4af37; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; text-align: center; max-width: 80%; line-height: 1.5; }

        @media (max-width: 800px) { 
            .gallery-grid { grid-template-columns: repeat(2, 1fr); } 
            h1 { font-size: 3.8rem; }
            .gallery-item img { filter: grayscale(0%); }
        }
    </style>
</head>
<body>

    <div class="nav-container">
        <a href="index.html" class="btn-home">Torna alla Home Page</a>
    </div>
    
    <div class="title-section">
        <h1>foto set</h1>
    </div>

    <div class="gallery-grid">
        <div class="gallery-item" onclick="openLightbox('scena1.jpg', 'Produzione Rai 1: Sul set della fiction «Nero a Metà 3»')">
            <img src="scena1.jpg" alt="Aurora Materni Nero a Metà 3">
        </div>

        <div class="gallery-item" onclick="openLightbox('scena2.jpg', 'Aurora Materni (Myriam) e Claudio Amendola - Nero a Metà 3')">
            <img src="scena2.jpg" alt="Aurora Materni e Claudio Amendola">
        </div>

        <div class="gallery-item" onclick="openLightbox('scena3.jpg', 'Dettaglio di scena: Fiction Rai «Nero a Metà 3»')">
            <img src="scena3.jpg" alt="Aurora Materni Set Rai">
        </div>

        <div class="gallery-item" onclick="openLightbox('scena4.jpg', 'Set «Sempre al tuo fianco» - Regia di Marco Pontecorvo')">
            <img src="scena4.jpg" alt="Aurora Materni regia Marco Pontecorvo">
        </div>

        <div class="gallery-item" onclick="openLightbox('scena5.jpg', 'Backstage: Aurora Materni e l\'attore Marco Iannitello')">
            <img src="scena5.jpg" alt="Aurora Materni e Marco Iannitello">
        </div>

        <div class="gallery-item" onclick="openLightbox('scena6.jpg', 'Frame Ufficiale: Aurora Materni in «Sempre al tuo fianco» (Rai 1)')">
            <img src="scena6.jpg" alt="Aurora Materni Sempre al tuo fianco">
        </div>
    </div>

    <div class="nav-container" style="padding-bottom: 100px;">
        <a href="index.html" class="btn-home">Torna alla Home Page</a>
    </div>

    <div id="lightbox" onclick="closeLightbox()">
        <span class="close-lightbox">&times;</span>
        <img id="lightbox-img" src="">
        <div id="lightbox-caption"></div>
    </div>

    <script>
        function openLightbox(src, text) {
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lightbox-img');
            const cap = document.getElementById('lightbox-caption');
            cap.innerHTML = text;
            lb.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            img.style.display = 'block';
            img.src = src;
        }
        function closeLightbox() {
            const lb = document.getElementById('lightbox');
            lb.style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
